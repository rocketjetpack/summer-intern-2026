<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" font-family="monospace" font-size="14">
  <defs>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="3" fill="#333" />
    </marker>
  </defs>

  <!-- links -->
  <line x1="130" y1="120" x2="330" y2="120" stroke="#333" stroke-width="2" marker-start="url(#dot)" marker-end="url(#dot)" />
  <line x1="430" y1="120" x2="630" y2="120" stroke="#333" stroke-width="2" marker-start="url(#dot)" marker-end="url(#dot)" />
  <line x1="380" y1="170" x2="380" y2="290" stroke="#333" stroke-width="2" marker-start="url(#dot)" marker-end="url(#dot)" />

  <!-- link labels -->
  <text x="160" y="108" fill="#555">10.5.1.0/24</text>
  <text x="450" y="108" fill="#555">10.5.2.0/24</text>
  <text x="392" y="235" fill="#555">10.5.9.0/24</text>

  <!-- host1 -->
  <rect x="30" y="90" width="100" height="60" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="80" y="115" text-anchor="middle" font-weight="bold">host1</text>
  <text x="80" y="135" text-anchor="middle" font-size="12">10.5.1.10/24</text>

  <!-- host2 -->
  <rect x="630" y="90" width="100" height="60" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="680" y="115" text-anchor="middle" font-weight="bold">host2</text>
  <text x="680" y="135" text-anchor="middle" font-size="12">10.5.2.10/24</text>

  <!-- rtr1 -->
  <rect x="330" y="90" width="100" height="80" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="380" y="120" text-anchor="middle" font-weight="bold">rtr1</text>
  <text x="380" y="138" text-anchor="middle" font-size="12">exporter</text>
  <text x="380" y="153" text-anchor="middle" font-size="11" fill="#555">sFlow / NetFlow</text>

  <!-- collector -->
  <rect x="330" y="290" width="100" height="60" rx="6" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="380" y="315" text-anchor="middle" font-weight="bold">collector</text>
  <text x="380" y="335" text-anchor="middle" font-size="12">10.5.9.10/24</text>

  <text x="380" y="395" text-anchor="middle" font-size="12" fill="#777">
    rtr1 forwards host1 &#8596; host2 traffic and exports flow telemetry for it to collector
  </text>
</svg>
